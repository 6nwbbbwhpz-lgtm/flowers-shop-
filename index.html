<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLORICA — Каталог</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f7f3f9; color: #2d2d44; margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 20px; text-align: center; font-weight: 800; font-size: 24px; border-bottom: 1px solid #e1e1e1; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Выбор города */
        .city-box { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .city-box select { padding: 8px 12px; border: 1px solid #7b81c2; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Галерея */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; background: #eee; }
        .btn-add { background: #7b81c2; color: white; border: none; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .section { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .extra-option { display: flex; align-items: center; gap: 10px; margin: 12px 0; font-size: 15px; }
        .order-btn { background: #25D366; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<header>FLORICA</header>

<div class="container">
    <!-- Выбор города -->
    <div class="city-box">
        <label for="city-select">📍 Город доставки:</label>
        <select id="city-select">
            <option value="Москва">Москва</option>
            <option value="Санкт-Петербург">Санкт-Петербург</option>
            <option value="Краснодар">Краснодар</option>
            <option value="Екатеринбург">Екатеринбург</option>
        </select>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="section">
        <h2>🎁 Дополнения</h2>
        <label class="extra-option"><input type="checkbox" class="extra" value="Коробка конфет"> 🍬 Коробка конфет</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Клубника в шоколаде"> 🍓 Клубника в шоколаде</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Шампанское"> 🍾 Шампанское</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Мягкая игрушка"> 🧸 Мягкая игрушка</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Записка с пожеланием"> 💌 Записка с пожеланием</label>
    </div>

    <div class="section">
        <h2>🛒 Ваша корзина</h2>
        <div id="cart-list" style="margin-bottom: 10px;">Корзина пуста</div>
        <div id="cart-total" style="font-weight: bold; margin-bottom: 15px;">Итого: 0 руб.</div>
        <button class="order-btn" onclick="sendOrder()">Оформить заказ в WhatsApp</button>
    </div>
</div>

<script>
    const myPhoneNumber = "79280126881";
    let cart = [];
    
    const products = [];
    for (let i = 1; i <= 55; i++) {
        products.push({ id: i, name: `Букет №${i}`, price: 2500, img: `${i}.jpg` });
    }

    const galleryEl = document.getElementById('gallery');
    products.forEach(p => {
        galleryEl.innerHTML += `
            <div class="product-card">
                <img src="${p.img}" alt="Букет" onerror="this.src='https://placehold.co/200x200?text=Фото'">
                <div style="font-weight:600; font-size:14px; margin-top:8px;">${p.name}</div>
                <div style="color:#7b81c2; font-weight:bold; margin:5px 0;">${p.price} руб.</div>
                <button class="btn-add" onclick="addToCart(${p.id})">В корзину</button>
            </div>`;
    });

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        cart.push(p);
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-list').innerHTML = cart.map(i => `<div>• ${i.name}</div>`).join('');
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        document.getElementById('cart-total').innerText = `Итого: ${total} руб.`;
    }

    function sendOrder() {
        if(cart.length === 0) return alert("Выберите хотя бы один букет!");
        const city = document.getElementById('city-select').value;
        let extras = Array.from(document.querySelectorAll('.extra:checked')).map(i => i.value);
        let message = `Здравствуйте! Мой заказ:\n📍 Город: ${city}\n\nБукеты: ` + cart.map(i => i.name).join(", ");
        if(extras.length > 0) message += "\n\n🎁 Доп: " + extras.join(", ");
        window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>
</body>
</html>
