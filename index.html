<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florica — Цветочная мастерская</title>
    <style>
        :root { --main: #7b81c2; --bg: #f7f3f9; --text: #2d2d44; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: white; padding: 20px; text-align: center; font-weight: 800; font-size: 24px; border-bottom: 1px solid #e1e1e1; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .product-card { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; background: #eee; }
        .btn-add { background: var(--main); color: white; border: none; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .section { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .extra-option { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 15px; }
        
        .cart-info { font-weight: bold; margin: 15px 0; }
        .order-btn { background: #25D366; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<header>FLORICA</header>

<div class="container">
    <div class="gallery" id="gallery"></div>

    <div class="section">
        <h2>🎁 Дополнения</h2>
        <label class="extra-option"><input type="checkbox" class="extra" value="Коробка конфет"> 🍬 Коробка конфет</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Клубника в шоколаде"> 🍓 Клубника в шоколаде</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Шампанское"> 🍾 Шампанское</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Мягкая игрушка"> 🧸 Мягкая игрушка</label>
        <label class="extra-option"><input type="checkbox" class="extra" value="Записка с пожеланием"> 💌 Записка с пожеланием</label>
    </div>

    <div class="section">
        <h2>🛒 Ваша корзина</h2>
        <div id="cart-list">Корзина пуста</div>
        <div class="cart-info" id="cart-total">Итого: 0 руб.</div>
        <button class="order-btn" onclick="sendOrder()">Оформить заказ в WhatsApp</button>
    </div>
</div>

<script>
    const myPhoneNumber = "79280126881";
    let cart = [];
    
    // ВАШ ШАБЛОН: меняйте названия и цены здесь
    const products = [
        { id: 1, name: "Английское утро", price: 9900, img: "1.jpg" },
        { id: 2, name: "Алые мечты", price: 3100, img: "2.jpg" }
    ];

    const galleryEl = document.getElementById('gallery');
    products.forEach(p => {
        galleryEl.innerHTML += `
            <div class="product-card">
                <img src="${p.img}" onerror="this.src='https://placehold.co/200x200?text=Фото'">
                <div style="font-weight:600; font-size:14px; margin-top:8px;">${p.name}</div>
                <div style="color:var(--main); font-weight:bold; margin:5px 0;">${p.price} руб.</div>
                <button class="btn-add" onclick="addToCart(${p.id})">В корзину</button>
            </div>`;
    });

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        cart.push(p);
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById('cart-list');
        const totalEl = document.getElementById('cart-total');
        list.innerHTML = cart.map(item => `<div>• ${item.name} — ${item.price} руб.</div>`).join('');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        totalEl.innerText = `Итого: ${total} руб.`;
    }

    function sendOrder() {
        if(cart.length === 0) return alert("Корзина пуста!");
        let message = "Здравствуйте! Хочу заказать: " + cart.map(i => i.name).join(", ");
        let extras = Array.from(document.querySelectorAll('.extra:checked')).map(i => i.value);
        if(extras.length > 0) message += "\n\n🎁 Доп: " + extras.join(", ");
        window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>
</body>
</html>
