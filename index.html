<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Магия Цветов — Каталог</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #fff9fa; color: #333; }
        header { background-color: #d63384; color: white; text-align: center; padding: 20px 10px; }
        h1 { margin: 0; font-size: 24px; }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        /* Выбор города */
        .city-box { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 12px 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 15px; box-sizing: border-box; }
        .city-box select { padding: 6px 12px; border: 1px solid #d63384; border-radius: 8px; color: #333; outline: none; font-size: 14px; background-color: #fff9fa; cursor: pointer; font-weight: bold; }

        /* Галерея товаров */
        .gallery { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .product-card { background: white; border: 1px solid #ffccd5; border-radius: 12px; width: 46%; max-width: 220px; padding: 8px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; background-color: #fff0f2; }
        .product-title { font-size: 13px; font-weight: bold; margin: 6px 0 4px 0; text-align: center; }
        .product-price { color: #d63384; font-weight: bold; margin-bottom: 6px; font-size: 13px; }
        .add-to-cart-btn { background-color: #d63384; color: white; border: none; padding: 6px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Дополнительные услуги */
        .extra-services-section { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 15px; margin: 25px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .extra-services-section h2 { color: #d63384; font-size: 18px; margin-top: 0; margin-bottom: 12px; }
        .extra-option { display: flex; align-items: center; gap: 10px; font-size: 15px; cursor: pointer; margin-bottom: 8px; padding: 4px 0; }
        .extra-option input { width: 18px; height: 18px; accent-color: #d63384; }
        .extra-note { font-size: 12px; color: #888; font-style: italic; margin-left: 28px; }
        
        /* Интерактивная Корзина */
        .cart-section { background: white; border: 2px solid #25D366; border-radius: 12px; padding: 15px; margin: 25px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cart-section h2 { margin-top: 0; color: #25D366; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .cart-items { margin-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .cart-total { font-weight: bold; text-align: right; margin-bottom: 15px; font-size: 16px; color: #333; }
        .whatsapp-btn { background-color: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <h1>🌸 Цветочная мастерская</h1>
    </header>

    <div class="container">
        
        <div class="city-box">
            <label for="city-select">📍 Выберите город доставки:</label>
            <select id="city-select">
                <option value="Москва">Москва</option>
                <option value="Санкт-Петербург">Санкт-Петербург</option>
                <option value="Краснодар">Краснодар</option>
                <option value="Екатеринбург">Екатеринбург</option>
                <option value="Другой город">Другой город</option>
            </select>
        </div>

        <div class="gallery" id="gallery"></div>

        <div class="extra-services-section">
            <h2>🎁 Добавить к букету (сопутствующие товары)</h2>
            
            <label class="extra-option">
                <input type="checkbox" id="extra-candy">
                <span>🍬 Коробка вкусных конфет</span>
            </label>
            <div class="extra-note">Цена по запросу (уточняйте у флориста)</div>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 8px 0;">

            <label class="extra-option">
                <input type="checkbox" id="extra-champagne">
                <span>🍾 Бутылка шампанского</span>
            </label>
            <div class="extra-note">Цена по запросу (уточняйте у флориста)</div>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 8px 0;">

            <label class="extra-option">
                <input type="checkbox" id="extra-combo">
                <span>🧺 VIP-набор: Цветы + Конфеты + Шампанское</span>
            </label>
            <div class="extra-note">Оформляется индивидуально в подарочную корзину</div>
        </div>

        <div class="cart-section">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items" class="cart-items">
                <p style="color: #888; font-style: italic; margin: 0;">Корзина пуста. Добавьте букеты!</p>
            </div>
            <div class="cart-total" id="cart-total">Итого: 0 руб.</div>
            <a href="#" class="whatsapp-btn" onclick="sendOrder(event)">Оформить заказ в WhatsApp</a>
        </div>
    </div>

    <script>
        // ВАШ НОМЕР ТЕЛЕФОНА ДЛЯ ЗАКАЗОВ
        const myPhoneNumber = "79280126881"; 

        // Автоматическая генерация списка из 55 товаров (от 1.jpg до 55.jpg)
        const products = [];
        for (let i = 1; i <= 55; i++) {
            // Небольшое разнообразие цен для красоты, вы сможете их поменять
            let defaultPrice = 2500;
            if (i % 3 === 0) defaultPrice = 3200;
            else if (i % 5 === 0) defaultPrice = 4500;
            else if (i % 7 === 0) defaultPrice = 1800;

            products.push({
                id: i,
                name: `Букет №${i}`,
                price: defaultPrice,
                file: `${i}.jpg` // Ищет файлы 1.jpg, 2.jpg...
            });
        }

        let cart = [];

        // Вывод карточек в галерею
        const galleryEl = document.getElementById('gallery');
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${prod.file}" alt="${prod.name}" onerror="this.src='https://placehold.co/200x150/fff0f2/d63384?text=Скоро+фото'">
                <div class="product-title">${prod.name}</div>
                <div class="product-price">${prod.price} руб.</div>
                <button class="add-to-cart-btn" onclick="addToCart(${prod.id})">В корзину</button>
            `;
            galleryEl.appendChild(card);
        });

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.count++; } else { cart.push({ ...product, count: 1 }); }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsEl = document.getElementById('cart-items');
            const cartTotalEl = document.getElementById('cart-total');
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<p style="color: #888; font-style: italic; margin: 0;">Корзина пуста.</p>';
                cartTotalEl.innerText = 'Итого: 0 руб.';
                return;
            }
            cartItemsEl.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.count;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>🌸 ${item.name} (x${item.count})</span><span>${item.price * item.count} руб.</span>`;
                cartItemsEl.appendChild(div);
            });
            cartTotalEl.innerText = `Итого: ${total} руб.`;
        }

        function sendOrder(e) {
            e.preventDefault();
            const selectedCity = document.getElementById('city-select').value;
            const candySelected = document.getElementById('extra-candy').checked;
            const champagneSelected = document.getElementById('extra-champagne').checked;
            const comboSelected = document.getElementById('extra-combo').checked;

            if (cart.length === 0 && !candySelected && !champagneSelected && !comboSelected) {
                alert('Пожалуйста, выберите товар!');
                return;
            }

            let message = `Здравствуйте! Мой заказ:\n📍 *Город доставки:* ${selectedCity}\n\n`;
            let total = 0;

            if (cart.length > 0) {
                message += '*Выбранные букеты:*\n';
                cart.forEach(item => {
                    message += `• ${item.name} — ${item.count} шт. (${item.price * item.count} руб.)\n`;
                    total += item.price * item.count;
                });
                message += `\n*Итого за букеты: ${total} руб.*\n`;
            }

            let hasExtras = false;
            let extrasText = '\n🎁 *Дополнительно к заказу (согласовать цену):*\n';
            if (candySelected) { extrasText += '• Коробка конфет 🍬\n'; hasExtras = true; }
            if (champagneSelected) { extrasText += '• Бутылка шампанского 🍾\n'; hasExtras = true; }
            if (comboSelected) { extrasText += '• VIP-набор (Цветы+Конфеты+Шампанское) 🧺\n'; hasExtras = true; }

            if (hasExtras) message += extrasText;

            window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
