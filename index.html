<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Florica — Каталог</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: #f7f3f9; color: #2d2d44; }
        header { background: white; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; border-bottom: 1px solid #e1e1e1; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Сетка в стиле Florica */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .product-card { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; background: #eee; }
        .product-title { font-weight: 600; margin: 10px 0 5px; font-size: 14px; }
        .product-price { font-weight: bold; color: #2d2d44; font-size: 15px; margin-bottom: 10px; }
        .add-to-cart-btn { background-color: #7b81c2; color: white; border: none; padding: 8px; border-radius: 10px; width: 100%; cursor: pointer; font-size: 13px; font-weight: bold; }

        /* Секция доп. услуг */
        .extra-services-section { background: white; border-radius: 20px; padding: 15px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .extra-option { display: flex; align-items: center; gap: 10px; font-size: 14px; margin-bottom: 8px; }

        /* Корзина и WhatsApp */
        .cart-section { background: white; border-radius: 20px; padding: 15px; margin-bottom: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .whatsapp-btn { background-color: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <header>FLORICA</header>

    <div class="container">
        <div class="gallery" id="gallery"></div>

        <div class="extra-services-section">
            <h2>🎁 Добавить к букету</h2>
            <label class="extra-option"><input type="checkbox" id="extra-candy"> 🍬 Коробка конфет</label>
            <label class="extra-option"><input type="checkbox" id="extra-strawberries"> 🍓 Клубника в шоколаде</label>
        </div>

        <div class="cart-section">
            <h2>🛒 Корзина</h2>
            <div id="cart-items">Корзина пуста</div>
            <div id="cart-total" style="font-weight: bold; margin-top: 10px;">Итого: 0 руб.</div>
            <a href="#" class="whatsapp-btn" onclick="sendOrder(event)">Оформить в WhatsApp</a>
        </div>
    </div>

    <script>
        const myPhoneNumber = "79280126881";
        const products = [];
        
        // Создаем товары от 1 до 55
        for (let i = 1; i <= 55; i++) {
            products.push({ 
                id: i, 
                name: `Букет №${i}`, 
                price: 2500, 
                img: `${i}.jpg` 
            });
        }

        const galleryEl = document.getElementById('gallery');
        products.forEach(prod => {
            galleryEl.innerHTML += `
                <div class="product-card">
                    <img src="${prod.img}" onerror="this.src='https://placehold.co/200x200?text=Фото'">
                    <div class="product-title">${prod.name}</div>
                    <div class="product-price">${prod.price} руб.</div>
                    <button class="add-to-cart-btn" onclick="alert('Букет №${prod.id} добавлен')">В корзину</button>
                </div>`;
        });

        function sendOrder(e) {
            e.preventDefault();
            window.open(`https://wa.me/${myPhoneNumber}?text=Здравствуйте, хочу сделать заказ!`, '_blank');
        }
    </script>
</body>
</html>
