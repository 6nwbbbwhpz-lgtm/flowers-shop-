<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florica — Цветочная мастерская</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: #f7f3f9; color: #2d2d44; }
        header { background: white; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; border-bottom: 1px solid #e1e1e1; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Сетка как у Florica */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; border-radius: 20px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; background: #eee; }
        .product-name { font-weight: 600; margin: 10px 0 5px; font-size: 14px; }
        .product-price { font-weight: bold; color: #2d2d44; font-size: 15px; margin-bottom: 10px; }
        
        .add-to-cart-btn { background-color: #7b81c2; color: white; border: none; padding: 8px; border-radius: 10px; width: 100%; cursor: pointer; font-size: 13px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #7b81c2; color: white; display: flex; justify-content: space-around; padding: 15px 0; border-radius: 20px 20px 0 0; font-weight: bold; }
    </style>
</head>
<body>

    <header>FLORICA</header>

    <div class="container">
        <div class="gallery" id="gallery"></div>
    </div>

    <div style="height: 80px;"></div>
    <div class="bottom-nav">
        <span>📞 Контакты</span>
        <span>🛒 Корзина</span>
    </div>

    <script>
        // Список букетов (добавляйте сюда новые по аналогии)
        const products = [
            { id: 1, name: "Английское утро", price: "9 900 руб.", img: "1.jpg" },
            { id: 2, name: "Алые мечты", price: "3 100 руб.", img: "2.jpg" },
            { id: 3, name: "Розы для любимой", price: "2 900 руб.", img: "3.jpg" },
            { id: 4, name: "Тайный сад", price: "2 900 руб.", img: "4.jpg" },
            { id: 5, name: "Время приключений", price: "17 400 руб.", img: "5.jpg" },
            { id: 6, name: "Мечты сбываются", price: "14 900 руб.", img: "6.jpg" },
            { id: 7, name: "Летний дождь", price: "11 100 руб.", img: "7.jpg" },
            { id: 8, name: "Сокровища жизни", price: "14 500 руб.", img: "8.jpg" }
        ];

        const galleryEl = document.getElementById('gallery');
        products.forEach(p => {
            galleryEl.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" onerror="this.src='https://placehold.co/200x200?text=Фото'">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price}</div>
                    <button class="add-to-cart-btn" onclick="alert('Добавлено: ${p.name}')">В корзину</button>
                </div>`;
        });
    </script>
</body>
</html>
